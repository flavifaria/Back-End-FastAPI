<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Usuários - CEEP</title>
</head>
<body>
    <nav>
        <a href="usuarios.html">Gerenciar Usuários</a> | 
        <a href="produtos.html">Gerenciar Produtos</a>
    </nav>
    <hr>

    <h1>Módulo de Usuários e Autenticação</h1>

    <h3>1. Cadastrar Usuário (POST)</h3>
    <form id="formCadastro">
        <input type="text" id="cadNome" placeholder="Nome" required>
        <input type="email" id="cadEmail" placeholder="E-mail" required>
        <input type="password" id="cadSenha" placeholder="Senha" required>
        <button type="submit">Cadastrar</button>
    </form>
    <p id="msgCadastro"></p>

    <h3>2. Fazer Login (POST /auth/login)</h3>
    <form id="formLogin">
        <input type="email" id="loginEmail" placeholder="E-mail" required>
        <input type="password" id="loginSenha" placeholder="Senha" required>
        <button type="submit">Entrar (Gerar Token)</button>
    </form>
    <p id="msgLogin"></p>

    <h3>3. Buscar Meu Perfil (GET /users/me)</h3>
    <button id="btnMeuPerfil">Ver quem está logado</button>
    <pre id="msgPerfil" style="background: #eee; padding: 10px;"></pre>

    <script src="usuarios.js"></script>
</body>
</html>
